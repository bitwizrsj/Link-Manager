<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkSaver</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>LinkSaver</h1>
      <span class="link-count" id="linkCount">0</span>
    </header>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search links..." autocomplete="off">
      <button class="add-link-btn" id="addLinkBtn" title="Add link manually">+</button>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="image">Images</button>
      <button class="filter-btn" data-filter="video">Videos</button>
      <button class="filter-btn" data-filter="website">Websites</button>
    </div>

    <div class="sort-bar">
      <label for="sortSelect">Sort:</label>
      <select id="sortSelect">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
        <option value="az">A-Z</option>
        <option value="za">Z-A</option>
      </select>
    </div>

    <div class="links-grid" id="linksGrid">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </div>
        <p>No saved links yet</p>
        <p class="empty-hint">Right-click any link, page, or image and choose "Save to LinkSaver"</p>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
